name: radaralert
description: Monitor de velocidade e alertas de radar para Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  http: ^1.2.1
  connectivity_plus: ^5.0.2
  vibration: ^1.9.0
  flutter_local_notifications: ^17.1.2
  shared_preferences: ^2.2.3
  wakelock_plus: ^1.2.5
  audioplayers: ^5.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/radares.json
